<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciar Sesión</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../CSS/style_login.css">
</head>

<body>

<div class="header-top">
    <img src="../imagenes/logo/zone_sport.png" class="logo">
    <span class="brand-name">ZONESPORT</span>
</div>

<div class="main-container d-flex justify-content-center align-items-center">

    <div class="form-box">

        <h2>Iniciar sesión</h2>
        <div class="line"></div>

 <form id="login-form">

    <div class="mb-3">
        <label>Correo Electrónico</label>
        <input type="email" id="email" class="form-control input-custom" placeholder="tucorreo@ejemplo.com">
        <div id="email-error" class="error text-danger"></div>
    </div>

    <div class="mb-2">
        <label>Contraseña</label>
        <div class="position-relative">
            <input type="password" id="password" class="form-control input-custom pe-5">
            <i class="bi bi-eye eye-icon"></i>
        </div>
        <div id="password-error" class="error text-danger"></div>
            <br>
    </div>
    <button type="submit" class="btn btn-custom w-100">Iniciar sesión</button>
    <div></div>

     <p class="text-center mt-3">
                ¿No tienes cuenta?
                <a href="registro.html" class="link-login">Crear cuenta
                </a>

</form>

    </div>

</div>
      <script src="../JS/login.js"></script>
</body>
</html>
