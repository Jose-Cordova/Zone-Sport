<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear Cuenta</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="style_registro.css">
</head>

<body>

<div class="header-top">
    <img src="../imagenes/logo/zone_sport.png" class="logo">
    <span class="brand-name">ZONESPORT</span>
</div>

<div class="main-container d-flex justify-content-center align-items-center">

    <div class="form-box">

        <h2>Crear Cuenta</h2>
        <div class="line"></div>

        <form>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label>Nombre</label>
                    <input type="text" class="form-control input-custom" placeholder="Nombre">
                </div>

                <div class="col-md-6">
                    <label>Apellido</label>
                    <input type="text" class="form-control input-custom" placeholder="Apellido">
                </div>
            </div>

            <div class="mb-3">
                <label>Correo Electrónico</label>
                <input type="email" class="form-control input-custom" placeholder="tucorreo@ejemplo.com">
            </div>

            <div class="row mb-2">
                <div class="col-md-6">
                    <label>Contraseña</label>
                    <div class="position-relative">
                        <input type="password" class="form-control input-custom pe-5">
                        <i class="bi bi-eye eye-icon"></i>
                    </div>
                </div>
                <div class="col-md-6">
                    <label>Confirmar Contraseña</label>
                    <input type="password" class="form-control input-custom">
                </div>
            </div>

            <div class="form-check mb-3 mt-3">
                <input class="form-check-input" type="checkbox">
                <label class="form-check-label">
                    Acepto los términos y condiciones y la política de privacidad
                </label>
            </div>

            <button class="btn btn-custom w-100">Crear Cuenta</button>

            <p class="text-center mt-3">
                ¿Ya tienes cuenta?
                <a href="login.html" class="link-login">Inicia sesión</a>
            </p>

        </form>

    </div>
