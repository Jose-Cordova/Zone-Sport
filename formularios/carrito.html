<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="../CSS/estilos.css">
  <link rel="stylesheet" href="../CSS/style_carrito.css">
</head>
<body class="body">
    <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <!-- Logo -->
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="/imagenes/logo/zone_sport.png" alt="Logo" width="40" height="40" class="me-2">
        <span class="fw-bold text-white fs-5">ZONESPORT</span>
      </a>
      <!-- Efecto collapse -->
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
        data-bs-target="#navbar_contenido">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbar_contenido">
        <!-- Link para volver al inicio -->
        <ul class="navbar-nav me-3" id="link_inicio">
          <li class="nav-item">
            <a class="nav-link fw-bold" href="/index.html">Inicio</a>
          </li>
        </ul>
        <!-- Barra de busqueda -->
        <form class="d-flex flex-grow-1 me-3 my-2 my-lg-0" role="search" id="frm_busqueda">
          <div class="input-group">
            <span class="input-group-text bg-white border-0">
              <i class="bi bi-search"></i>
            </span>
            <input class="form-control border-0" type="search" placeholder="Buscar productos...">
          </div>
        </form>
        <!-- Iconos y Botones -->
        <div class="d-flex align-items-center gap-3 my-2 my-lg-0">
          <a href="#" id="btn_notificacion">
            <img src="/imagenes/iconos/notificacion.png" alt="notificacion" width="25" height="25">
          </a>
          <a href="#" id="btn_carrito">
            <img src="/imagenes/iconos/carrito_compras.png" alt="carrito_compra" width="25" height="25">
          </a>
          <button class="btn btn-outline-light btn-sm" id="btn_iniciar_sesion">Iniciar Sesión</button>
          <button class="btn btn-primary btn-sm" id="btn_registrar">Registrarse</button>
        </div>
      </div>
    </div>
  </nav><br><br>

 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZonaSport</title>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="nav-left">
        <div class="logo">ZONASPORT</div>
        <a href="#">Inicio</a>
        <input type="text" class="search" placeholder="Buscar productos...">
    </div>

    <div class="nav-right">
        <div class="icon">🔔</div>
        <div class="icon">🛒</div>
        <button class="usuario-btn">Usuario</button>
    </div>

</div>

<!-- CARRITO -->
<div class="container">
    <div class="carrito">

        <div class="producto">
            <img src="/imagenes/imagenes_productos/camiseta.webp" alt="">
            <div class="info">
                <div class="nombre">Mockup Camiseta de Fútbol</div>
                <div class="precio">$160.00</div>
            </div>
            <div class="cantidad">
                <button>-</button>
                <span>1</span>
                <button>+</button>
            </div>
        </div>

        <div class="producto">
            <img src="/imagenes/imagenes_productos/balon.webp" alt="">
            <div class="info">
                <div class="nombre">Balón de Fútbol</div>
                <div class="precio">$80.00</div>
            </div>
            <div class="cantidad">
                <button>-</button>
                <span>1</span>
                <button>+</button>
            </div>
        </div>

        <div class="producto">
            <img src="/imagenes/imagenes_productos/guantes.webp" alt="">
            <div class="info">
                <div class="nombre">Guantes</div>
            <div class="precio">$60.00</div>
            </div>
            
            <div class="cantidad">
                <button>-</button>
                <span>1</span>
                <button>+</button>
            </div>
        </div>

        <div class="total">
            <span>Total:</span>
            <span>$300.00</span>
        </div>

        <button class="btn-pago">Realizar el pago</button>

    </div>
</div>

</body>
</html>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous">
  </script>

</body>
</html>
