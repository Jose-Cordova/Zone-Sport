<!DOCTYPE html>
<html lang="es">
<head>

    <title>Carrito</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../CSS/estilos.css">

    <link rel="icon" href="/imagenes/logo/zone_sport.png" type="image/x-com">

<body class="body">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="/imagenes/logo/zone_sport.png" alt="Logo" width="40" height="40" class="me-2">
            <span class="fw-bold text-white fs-5">ZONESPORT</span>
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbar_contenido">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar_contenido">

            <ul class="navbar-nav me-3">
                <li class="nav-item">
                    <a class="nav-link fw-bold" href="/index.html">Inicio</a>
                </li>
            </ul>

            <form class="d-flex flex-grow-1 me-3 my-2 my-lg-0">
                <div class="input-group">
                    <input class="form-control" type="search" placeholder="Buscar productos...">
                </div>
            </form>

            <div class="d-flex align-items-center gap-3 my-2 my-lg-0">
                <a href="#">
                    <img src="/imagenes/iconos/notificacion.png" width="25">
                </a>
                <a href="#">
                    <img src="/imagenes/iconos/carrito_compras.png" width="25">
                </a>
                <button class="btn btn-outline-light btn-sm">Iniciar Sesión</button>
                <button class="btn btn-primary btn-sm">Registrarse</button>
            </div>

        </div>
    </div>
</nav>


<div class="container mt-5">
    <div class="card shadow p-4">

        
       <div class="producto d-flex align-items-center justify-content-between mb-4" data-precio="160">
    <div class="d-flex align-items-center">
        <img src="/imagenes/imagenes_productos/camiseta.webp" width="100" class="rounded me-3">
        <div>
            <h6 class="mb-1">Mockup Camiseta de Fútbol</h6>
            <p class="mb-0">$160.00</p>
        </div>
      </div>
      <div class="control-cantidad">
        <button class="btn btn-light btn-sm menos">-</button>
        <span class="mx-2 cantidad">1</span>
        <button class="btn btn-light btn-sm mas">+</button>
     </div>
       </div>

        
       <div class="producto d-flex align-items-center justify-content-between mb-4" data-precio="80">
    <div class="d-flex align-items-center">
        <img src="/imagenes/imagenes_productos/balon.webp" width="100" class="rounded me-3">
        <div>
            <h6 class="mb-1">Balón de Fútbol</h6>
            <p class="mb-0">$80.00</p>
        </div>
    </div>
    <div class="control-cantidad">
        <button class="btn btn-light btn-sm menos">-</button>
        <span class="mx-2 cantidad">1</span>
        <button class="btn btn-light btn-sm mas">+</button>
    </div>
</div>

        
       <div class="producto d-flex align-items-center justify-content-between mb-4" data-precio="60">
    <div class="d-flex align-items-center">
        <img src="/imagenes/imagenes_productos/guantes.webp" width="100" class="rounded me-3">
        <div>
            <h6 class="mb-1">Guantes</h6>
            <p class="mb-0">$60.00</p>
        </div>
    </div>
    <div class="control-cantidad">
        <button class="btn btn-light btn-sm menos">-</button>
        <span class="mx-2 cantidad">1</span>
        <button class="btn btn-light btn-sm mas">+</button>
    </div>
</div>

        
        <div class="d-flex justify-content-between fs-5 fw-bold border-top pt-3">
            <span>Total:</span>
            <span id="total">$300.00</span>
        </div>

        <a href="pedido.html" id="btnPagar" class="btn btn-primary w-100 mt-3">
    Realizar el pago
</a>

    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
