<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" href="/imagenes/logo/zone_sport.png" type="image/x-com">
    <link rel="stylesheet" href="../CSS/style_registro.css">
</head>

<body>

    <div class="header-top text-center">
        <img src="../imagenes/logo/zone_sport.png" alt="Logo ZONESPORT" class="logo">
        <span class="brand-name">ZONESPORT</span>
    </div>

    <div class="main-container d-flex justify-content-center align-items-center">
        <div class="form-box">
            <h2>Crear Cuenta</h2>
            <div class="line"></div>

            <form id="registro-form">

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" class="form-control input-custom" placeholder="Nombre" required>
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="col-md-6">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" class="form-control input-custom" placeholder="Apellido" required>
                        <div class="invalid-feedback"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" class="form-control input-custom" placeholder="tucorreo@ejemplo.com" required>
                    <div class="invalid-feedback"></div>
                </div>

                <div class="row mb-2">
                    <div class="col-md-6">
                        <label for="contrasena">Contraseña</label>
                        <div class="position-relative">
                            <input type="password" id="contrasena" class="form-control input-custom pe-5" required>
                            <div class="invalid-feedback"></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="confirmar">Confirmar Contraseña</label>
                        <input type="password" id="confirmar" class="form-control input-custom" required>
                        <div class="invalid-feedback"></div>
                    </div>
                </div>

                <div class="form-check mb-3 mt-3">
                    <input class="form-check-input" type="checkbox" id="terminos" required>
                    <label class="form-check-label" for="terminos">
                        Acepto los términos y condiciones y la política de privacidad
                    </label>
                    <div class="invalid-feedback"></div>
                </div>

                <button type="submit" class="btn btn-custom w-100">Crear Cuenta</button>
                <p class="text-center mt-3">
                    ¿Ya tienes cuenta?
                    <a href="login.html" class="link-login">Inicia sesión</a>
                </p>
                
            </form>

            <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
            <script src="../JS/registro.js"></script>

        </div>
    </div>

</body>
</html>
